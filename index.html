<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Changer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Smoothly transition the background color change over 1 second */
            transition: background-color 1s ease-in-out; 
        }
    </style>
</head>
<body>

    <script>
        function setRandomColor() {
            // Generate random values for Red, Green, and Blue (0-255)
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            // Apply the RGB color to the body background
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }

        // Change the color immediately on load
        setRandomColor();

        // Repeat the color change every 5000 milliseconds (5 seconds)
        setInterval(setRandomColor, 5000);
    </script>
</body>
</html>
